name: release
on:
  push:
    tags:
      - '*'
jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tagName.outputs.tag }}
      is_highest: ${{ steps.highestTag.outputs.is_highest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get tag
        uses: little-core-labs/get-git-tag@v3.0.2
        id: tagName
      - name: Highest tag
        id: highestTag
        run: |
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*
          highest=$(git tag | grep -E "^v?([0-9]+\.)+[0-9]+$" | sort -r -V | head -n1)
          if [ "${{ steps.tagName.outputs.tag }}" = "$highest" ]; then
            echo is_highest=true >> $GITHUB_OUTPUT
          else
            echo is_highest=false >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push image
        run: make docker-push-arch
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ needs.prepare.outputs.tag }}
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Create version manifest
        run: make docker-manifest
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
      - name: Create latest manifest
        if: needs.prepare.outputs.is_highest == 'true'
        run: make docker-manifest IMAGE_TAG=latest
